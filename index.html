<html lang="it"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Budget">
<title>Budget Personale</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:#0f0f13;color:#e2e8f0;padding-bottom:env(safe-area-inset-bottom)}
  input,button{font-family:inherit}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
  ::-webkit-scrollbar{display:none}
  .page{max-width:540px;margin:0 auto;padding:0 14px}
  .hidden{display:none!important}

  /* Header */
  .hdr{background:linear-gradient(135deg,#0d1b2a 0%,#0f0f13 100%);padding:calc(env(safe-area-inset-top) + 20px) 16px 18px;border-bottom:1px solid #1e1e2e}
  .hdr-label{margin:0;font-size:11px;letter-spacing:3px;color:#94a3b8;text-transform:uppercase;font-weight:600}
  .hdr-title{margin:4px 0 14px;font-size:22px;font-weight:700;color:#fff}
  .hdr-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
  .hdr-card{background:#16162a;border-radius:12px;padding:11px 10px}
  .hdr-card-label{margin:0;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px}
  .hdr-card-val{margin:3px 0 0;font-size:15px;font-weight:800;line-height:1.1}

  /* Nav tabs */
  .nav{display:flex;background:#16162a;border-radius:12px;padding:4px;gap:4px;margin-top:14px}
  .nav-btn{flex:1;padding:9px 0;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:13px;transition:all .2s;background:transparent;color:#475569}
  .nav-btn.active-spese{background:#6366f1;color:#fff}
  .nav-btn.active-entrate{background:#10b981;color:#fff}
  .nav-btn.active-saldo{background:#06b6d4;color:#fff}

  /* Cards / Forms */
  .card{background:#16162a;border-radius:16px;padding:18px;margin-top:16px}
  .card-title{margin:0 0 13px;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
  .field-label{display:block;font-size:11px;color:#64748b;margin-bottom:5px;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
  .input{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #1e293b;background:#0f0f1a;color:#e2e8f0;font-size:14px;outline:none}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .cats{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
  .cat-btn{padding:5px 10px;border-radius:8px;font-size:12px;border:none;cursor:pointer;font-weight:500;color:#94a3b8;background:#1e1e2e;transition:all .15s}
  .cat-btn span{font-size:10px;opacity:.7;margin-left:3px}
  .btn-primary{width:100%;padding:11px;border-radius:10px;border:none;cursor:pointer;font-weight:700;font-size:14px;color:#fff;margin-top:12px}
  .btn-cancel{padding:11px 14px;border-radius:10px;border:1px solid #334155;background:transparent;color:#94a3b8;cursor:pointer;font-size:13px;margin-top:12px}
  .btn-row{display:flex;gap:8px}

  /* Fiscal breakdown preview */
  .fiscal-preview{background:#0a1a0a;border:1px solid #10b98122;border-radius:10px;padding:12px 14px;margin-bottom:10px}
  .fiscal-preview-title{margin:0 0 8px;font-size:10px;color:#10b981;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .fiscal-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #1a2a1a}
  .fiscal-row-label{font-size:12px;color:#64748b}
  .fiscal-row-val{font-size:13px}

  /* Sub tabs */
  .subtabs{display:flex;gap:4px;margin:14px 0 12px;background:#16162a;border-radius:10px;padding:4px}
  .subtab-btn{flex:1;padding:8px;border-radius:8px;border:none;cursor:pointer;font-weight:600;font-size:13px;background:transparent;color:#64748b}

  /* Filter chips */
  .chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;margin-bottom:12px}
  .chip{padding:6px 12px;border-radius:20px;border:none;cursor:pointer;font-size:12px;flex-shrink:0;font-weight:500;transition:all .15s}

  /* Entry list */
  .entry-list{display:flex;flex-direction:column;gap:8px}
  .entry{background:#16162a;border:1px solid #1e1e3a;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px}
  .entry-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .entry-info{flex:1;min-width:0}
  .entry-name{margin:0;font-size:13px;font-weight:600;color:#e2e8f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .entry-sub{margin:0;font-size:11px;color:#475569}
  .entry-amount{flex-shrink:0;text-align:right}
  .entry-btns{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
  .icon-btn{width:28px;height:28px;border-radius:6px;border:none;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}

  /* Category breakdown */
  .breakdown-list{display:flex;flex-direction:column;gap:8px}
  .breakdown-item{background:#16162a;border:1px solid #1e1e3a;border-radius:12px;padding:14px 16px}
  .breakdown-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
  .breakdown-bar-bg{height:5px;background:#1e1e2e;border-radius:4px;overflow:hidden}
  .breakdown-bar{height:100%;border-radius:4px;transition:width .4s}

  /* Saldo tab */
  .saldo-grid{display:flex;flex-direction:column;gap:12px;margin-top:16px}
  .saldo-hero{border-radius:16px;padding:22px 20px;text-align:center}
  .saldo-label{margin:0;font-size:11px;color:#64748b;letter-spacing:2px;text-transform:uppercase}
  .saldo-val{margin:8px 0 0;font-size:40px;font-weight:900;line-height:1}
  .saldo-note{margin:8px 0 0;font-size:12px;color:#64748b}
  .info-card{background:#16162a;border:1px solid #1e1e3a;border-radius:14px;padding:16px}
  .info-card-title{margin:0 0 12px;font-size:12px;color:#64748b;font-weight:600;text-transform:uppercase;letter-spacing:1px}
  .info-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e1e2e}
  .info-row-label{font-size:12px;color:#94a3b8}
  .info-row-val{font-size:13px;font-weight:700}

  /* Fiscal agg */
  .fiscal-agg{background:#0a1a0a;border:1px solid #10b98133;border-radius:12px;padding:16px;margin-top:10px}
  .fiscal-agg-title{margin:0 0 12px;font-size:11px;color:#10b981;letter-spacing:2px;text-transform:uppercase;font-weight:600}
  .fiscal-block{margin-bottom:12px}
  .fiscal-block-title{margin:0 0 6px;font-size:12px;font-weight:600}
  .fiscal-total-box{margin-top:8px;padding:10px;background:#0f2a0f;border-radius:8px}

  /* Empty */
  .empty{text-align:center;padding:40px 0;color:#475569}
  .empty-emoji{font-size:32px;margin:0}
  .empty-text{margin:6px 0 0;font-size:14px}

  /* Bar compare */
  .bar-row{margin-bottom:12px}
  .bar-header{display:flex;justify-content:space-between;margin-bottom:5px}
  .bar-bg{height:8px;background:#1e1e2e;border-radius:4px;overflow:hidden}
  .bar-fill{height:100%;border-radius:4px;transition:width .5s}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="page">
    <p class="hdr-label" id="hdr-month">Giu 2026</p>
    <h1 class="hdr-title">Budget Personale</h1>
    <div class="hdr-grid">
      <div class="hdr-card" style="border:1px solid #10b98122">
        <p class="hdr-card-label">Incassato</p>
        <p class="hdr-card-val" style="color:#10b981"><span style="font-size:11px;opacity:.7">+</span> <span id="h-inc">0€</span></p>
      </div>
      <div class="hdr-card" style="border:1px solid #ef444422">
        <p class="hdr-card-label">Spese</p>
        <p class="hdr-card-val" style="color:#ef4444"><span style="font-size:11px;opacity:.7">−</span> <span id="h-exp">0€</span></p>
      </div>
      <div class="hdr-card" id="h-saldo-card" style="border:1px solid #06b6d422">
        <p class="hdr-card-label">Saldo</p>
        <p class="hdr-card-val" id="h-saldo-val" style="color:#06b6d4"><span style="font-size:11px;opacity:.7">=</span> <span id="h-saldo">0€</span></p>
      </div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="page">
  <!-- Nav -->
  <div class="nav">
    <button class="nav-btn active-spese" onclick="switchTab(&#39;spese&#39;)">💸 Spese</button>
    <button class="nav-btn" onclick="switchTab(&#39;entrate&#39;)">💵 Entrate</button>
    <button class="nav-btn" onclick="switchTab(&#39;saldo&#39;)">📊 Saldo</button>
  </div>

  <!-- ══ TAB SPESE ══ -->
  <div id="tab-spese">
    <div class="card" style="border:1px solid #6366f133">
      <p class="card-title" id="exp-form-title" style="color:#6366f1">＋ Nuova spesa</p>
      <div class="grid2">
        <div><label class="field-label">Importo (€)</label><input class="input" type="number" inputmode="decimal" placeholder="0.00" id="exp-amount"></div>
        <div><label class="field-label">Data</label><input class="input" type="date" id="exp-date"></div>
      </div>
      <label class="field-label">Categoria</label>
      <div class="cats" id="exp-cats"><button class="cat-btn">🏠 Casa</button><button class="cat-btn" style="background: rgb(245, 158, 11); color: rgb(255, 255, 255);">🍽️ Cibo &amp; Ristoranti</button><button class="cat-btn">🚗 Trasporti</button><button class="cat-btn">💼 Lavoro</button><button class="cat-btn">🏃 Salute &amp; Sport</button><button class="cat-btn">🛍️ Shopping</button><button class="cat-btn">🎬 Svago</button><button class="cat-btn">📌 Altro</button></div>
      <label class="field-label">Nota (opzionale)</label>
      <input class="input" type="text" placeholder="es. Cena con cliente, carburante..." id="exp-note" style="margin-bottom:0">
      <div class="btn-row">
        <button class="btn-primary" id="exp-submit-btn" style="background:#6366f1" onclick="submitExp()">Aggiungi spesa</button>
        <button class="btn-cancel hidden" id="exp-cancel-btn" onclick="cancelExp()">Annulla</button>
      </div>
    </div>
    <div class="subtabs">
      <button class="subtab-btn" id="exp-sub-lista" onclick="setExpView(&#39;lista&#39;)" style="background: rgb(99, 102, 241); color: rgb(255, 255, 255);">Lista</button>
      <button class="subtab-btn" id="exp-sub-ric" onclick="setExpView(&#39;riepilogo&#39;)" style="background: transparent; color: rgb(100, 116, 139);">Per categoria</button>
    </div>
    <div id="exp-filter-chips" class="chips"><button class="chip" style="background:#6366f1;color:#fff" onclick="setExpFilter(&#39;all&#39;)">Tutte</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;casa&#39;)">🏠</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;cibo&#39;)">🍽️</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;trasporti&#39;)">🚗</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;lavoro&#39;)">💼</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;salute&#39;)">🏃</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;shopping&#39;)">🛍️</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;svago&#39;)">🎬</button><button class="chip" style="background:#1e1e2e;color:#64748b" onclick="setExpFilter(&#39;altro_usc&#39;)">📌</button></div>
    <div id="exp-list"><div class="empty"><p class="empty-emoji">💸</p><p class="empty-text">Nessuna spesa questo mese</p></div></div>
  </div>

  <!-- ══ TAB ENTRATE ══ -->
  <div id="tab-entrate" class="hidden">
    <div class="card" style="border:1px solid #10b98133">
      <p class="card-title" id="inc-form-title" style="color:#10b981">＋ Nuova entrata</p>
      <label class="field-label">Categoria</label>
      <div class="cats" id="inc-cats"><button class="cat-btn" style="background: rgb(6, 182, 212); color: rgb(255, 255, 255);">🏢 Fisso Adorea<span>· P.IVA</span></button><button class="cat-btn">📈 Provvigioni Adorea<span>· P.IVA</span></button><button class="cat-btn">🧾 Fatture 3T<span>· P.IVA</span></button><button class="cat-btn">💰 Extra<span>· Extra</span></button></div>
      <div class="grid2">
        <div><label class="field-label" id="inc-imp-label">Imponibile (€)</label><input class="input" type="number" inputmode="decimal" placeholder="0.00" id="inc-amount" oninput="updateFiscalPreview()"></div>
        <div><label class="field-label">Data</label><input class="input" type="date" id="inc-date"></div>
      </div>
      <div id="fiscal-preview" class="fiscal-preview hidden">
        <p class="fiscal-preview-title">Dettaglio fattura</p>
        <div id="fiscal-preview-rows"></div>
      </div>
      <label class="field-label">Nota (opzionale)</label>
      <input class="input" type="text" placeholder="es. Fattura #12, Provvigioni maggio..." id="inc-note" style="margin-bottom:0">
      <div class="btn-row">
        <button class="btn-primary" id="inc-submit-btn" style="background:#10b981" onclick="submitInc()">Aggiungi entrata</button>
        <button class="btn-cancel hidden" id="inc-cancel-btn" onclick="cancelInc()">Annulla</button>
      </div>
    </div>
    <div class="subtabs">
      <button class="subtab-btn" id="inc-sub-lista" onclick="setIncView(&#39;lista&#39;)" style="background: rgb(16, 185, 129); color: rgb(255, 255, 255);">Lista</button>
      <button class="subtab-btn" id="inc-sub-ric" onclick="setIncView(&#39;riepilogo&#39;)" style="background: transparent; color: rgb(100, 116, 139);">Per categoria</button>
    </div>
    <div id="inc-list"><div class="empty"><p class="empty-emoji">💵</p><p class="empty-text">Nessuna entrata questo mese</p></div></div>
  </div>

  <!-- ══ TAB SALDO ══ -->
  <div id="tab-saldo" class="hidden">
    <div class="saldo-grid">
      <div class="saldo-hero" id="saldo-hero">
        <p class="saldo-label" id="saldo-hero-label"></p>
        <p class="saldo-val" id="saldo-hero-val"></p>
        <p class="saldo-note" id="saldo-hero-note"></p>
      </div>
      <div class="info-card">
        <p class="info-card-title">Confronto mese</p>
        <div class="bar-row">
          <div class="bar-header"><span style="font-size:13px;font-weight:600;color:#e2e8f0">Incassato netto</span><span id="saldo-bar-inc-val" style="font-size:13px;font-weight:700;color:#10b981"></span></div>
          <div class="bar-bg"><div class="bar-fill" id="saldo-bar-inc" style="background:#10b981"></div></div>
        </div>
        <div class="bar-row">
          <div class="bar-header"><span style="font-size:13px;font-weight:600;color:#e2e8f0">Spese</span><span id="saldo-bar-exp-val" style="font-size:13px;font-weight:700;color:#ef4444"></span></div>
          <div class="bar-bg"><div class="bar-fill" id="saldo-bar-exp" style="background:#ef4444"></div></div>
        </div>
        <p id="saldo-imp-note" style="margin:8px 0 0;font-size:11px;color:#475569"></p>
      </div>
      <div class="info-card">
        <p class="info-card-title">Fonti di reddito (netto)</p>
        <div id="saldo-fonti"></div>
      </div>
      <div class="info-card">
        <p class="info-card-title">Dove vanno i soldi</p>
        <div id="saldo-spese"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────────
const EXPENSE_CATS = [
  {id:"casa",      label:"Casa",              emoji:"🏠", color:"#6366f1"},
  {id:"cibo",      label:"Cibo & Ristoranti", emoji:"🍽️", color:"#f59e0b"},
  {id:"trasporti", label:"Trasporti",          emoji:"🚗", color:"#10b981"},
  {id:"lavoro",    label:"Lavoro",             emoji:"💼", color:"#3b82f6"},
  {id:"salute",    label:"Salute & Sport",     emoji:"🏃", color:"#ef4444"},
  {id:"shopping",  label:"Shopping",           emoji:"🛍️", color:"#ec4899"},
  {id:"svago",     label:"Svago",              emoji:"🎬", color:"#8b5cf6"},
  {id:"altro_usc", label:"Altro",              emoji:"📌", color:"#64748b"},
];
const INCOME_CATS = [
  {id:"fisso_adorea", label:"Fisso Adorea",      emoji:"🏢", color:"#06b6d4", tag:"P.IVA", isPiva:true},
  {id:"provvigioni",  label:"Provvigioni Adorea", emoji:"📈", color:"#10b981", tag:"P.IVA", isPiva:true},
  {id:"fatture_3t",   label:"Fatture 3T",         emoji:"🧾", color:"#f59e0b", tag:"P.IVA", isPiva:true},
  {id:"extra",        label:"Extra",              emoji:"💰", color:"#a78bfa", tag:"Extra",  isPiva:false},
];
const MONTHS = ["Gen","Feb","Mar","Apr","Mag","Giu","Lug","Ago","Set","Ott","Nov","Dic"];

// ── FISCAL ────────────────────────────────────────────────────────────────
function calcFattura(imp) {
  imp = parseFloat(imp)||0;
  const iva = imp*0.22, ritenuta = imp*0.20;
  const totaleFattura = imp+iva;
  const incassato = totaleFattura-ritenuta;
  return {imp,iva,ritenuta,totaleFattura,incassato};
}

// ── HELPERS ───────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function monthKey(d) { const dt=new Date(d); return `${dt.getFullYear()}-${dt.getMonth()}`; }
function monthLabel(d) { const dt=new Date(d); return `${MONTHS[dt.getMonth()]} ${dt.getFullYear()}`; }
function fmt(n) { return new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(n||0); }
function fmtShort(n) { return new Intl.NumberFormat("it-IT").format(Math.abs(Math.round(n||0)))+"€"; }
function expCat(id) { return EXPENSE_CATS.find(c=>c.id===id)||EXPENSE_CATS[EXPENSE_CATS.length-1]; }
function incCat(id) { return INCOME_CATS.find(c=>c.id===id)||INCOME_CATS[INCOME_CATS.length-1]; }
function incassatoNetto(item) {
  const c=incCat(item.category);
  return c.isPiva ? calcFattura(item.amount).incassato : item.amount;
}

// ── STATE ─────────────────────────────────────────────────────────────────
let expenses = JSON.parse(localStorage.getItem("budget_exp")||"[]");
let incomes  = JSON.parse(localStorage.getItem("budget_inc")||"[]");
let currentTab = "spese";
let expView = "lista";
let incView = "lista";
let expFilter = "all";
let expEditId = null;
let incEditId = null;
let expCatSel = "cibo";
let incCatSel = "fisso_adorea";

function save() {
  localStorage.setItem("budget_exp", JSON.stringify(expenses));
  localStorage.setItem("budget_inc", JSON.stringify(incomes));
}

const mk = monthKey(today());

function totalExp() { return expenses.filter(e=>monthKey(e.date)===mk).reduce((s,e)=>s+e.amount,0); }
function totalInc() { return incomes.filter(i=>monthKey(i.date)===mk).reduce((s,i)=>s+incassatoNetto(i),0); }
function totalImponibile() { return incomes.filter(i=>monthKey(i.date)===mk&&incCat(i.category).isPiva).reduce((s,i)=>s+i.amount,0); }

// ── INIT ──────────────────────────────────────────────────────────────────
window.onload = function() {
  document.getElementById("hdr-month").textContent = monthLabel(today());
  document.getElementById("exp-date").value = today();
  document.getElementById("inc-date").value = today();
  buildExpCats();
  buildIncCats();
  setExpView("lista");
  setIncView("lista");
  renderAll();
};

// ── TAB SWITCH ────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ["spese","entrate","saldo"].forEach(t => {
    document.getElementById("tab-"+t).classList.toggle("hidden", t!==tab);
  });
  document.querySelectorAll(".nav-btn").forEach((btn,i) => {
    const tabs=["spese","entrate","saldo"];
    btn.className = "nav-btn" + (tabs[i]===tab ? " active-"+tabs[i] : "");
  });
  if(tab==="saldo") renderSaldo();
}

// ── CAT BUTTONS ───────────────────────────────────────────────────────────
function buildExpCats() {
  const el = document.getElementById("exp-cats");
  el.innerHTML = "";
  EXPENSE_CATS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerHTML = c.emoji+" "+c.label;
    btn.onclick = () => { expCatSel=c.id; buildExpCats(); };
    if(expCatSel===c.id) { btn.style.background=c.color; btn.style.color="#fff"; }
    el.appendChild(btn);
  });
}
function buildIncCats() {
  const el = document.getElementById("inc-cats");
  el.innerHTML = "";
  INCOME_CATS.forEach(c => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.innerHTML = c.emoji+" "+c.label+`<span>· ${c.tag}</span>`;
    btn.onclick = () => { incCatSel=c.id; buildIncCats(); updateFiscalPreview(); updateIncLabel(); };
    if(incCatSel===c.id) { btn.style.background=c.color; btn.style.color="#fff"; }
    el.appendChild(btn);
  });
}
function updateIncLabel() {
  const c = incCat(incCatSel);
  document.getElementById("inc-imp-label").textContent = c.isPiva ? "Imponibile (€)" : "Importo (€)";
}

// ── FISCAL PREVIEW ────────────────────────────────────────────────────────
function updateFiscalPreview() {
  const c = incCat(incCatSel);
  const imp = parseFloat(document.getElementById("inc-amount").value)||0;
  const preview = document.getElementById("fiscal-preview");
  if(!c.isPiva || imp<=0) { preview.classList.add("hidden"); return; }
  preview.classList.remove("hidden");
  const calc = calcFattura(imp);
  const rows = [
    {l:"Imponibile",       v:calc.imp,           col:"#e2e8f0", bold:false},
    {l:"+ IVA 22%",        v:calc.iva,           col:"#94a3b8", bold:false},
    {l:"= Totale fattura", v:calc.totaleFattura, col:"#f1f5f9", bold:true},
    {l:"− Ritenuta 20%",   v:calc.ritenuta,      col:"#ef4444", bold:false},
    {l:"= Incassato netto",v:calc.incassato,     col:"#10b981", bold:true},
  ];
  document.getElementById("fiscal-preview-rows").innerHTML = rows.map(r=>
    `<div class="fiscal-row"><span class="fiscal-row-label">${r.l}</span><span class="fiscal-row-val" style="color:${r.col};font-weight:${r.bold?700:400}">${fmt(r.v)}</span></div>`
  ).join("");
}

// ── EXPENSE HANDLERS ──────────────────────────────────────────────────────
function submitExp() {
  const amt = parseFloat(document.getElementById("exp-amount").value);
  const date = document.getElementById("exp-date").value;
  if(!amt||!date) return;
  const entry = {id:expEditId||Date.now(), date, amount:amt, category:expCatSel, note:document.getElementById("exp-note").value};
  if(expEditId) {
    expenses = expenses.map(e=>e.id===expEditId?entry:e);
    expEditId=null;
  } else {
    expenses.unshift(entry);
  }
  save();
  document.getElementById("exp-amount").value="";
  document.getElementById("exp-note").value="";
  document.getElementById("exp-date").value=today();
  document.getElementById("exp-form-title").textContent="＋ Nuova spesa";
  document.getElementById("exp-submit-btn").textContent="Aggiungi spesa";
  document.getElementById("exp-cancel-btn").classList.add("hidden");
  renderAll();
}
function editExp(id) {
  const e = expenses.find(x=>x.id===id); if(!e) return;
  expEditId=id; expCatSel=e.category;
  document.getElementById("exp-amount").value=e.amount;
  document.getElementById("exp-date").value=e.date;
  document.getElementById("exp-note").value=e.note||"";
  document.getElementById("exp-form-title").textContent="✏️ Modifica spesa";
  document.getElementById("exp-form-title").style.color="#f59e0b";
  document.getElementById("exp-submit-btn").textContent="Salva modifiche";
  document.getElementById("exp-submit-btn").style.background="#f59e0b";
  document.getElementById("exp-cancel-btn").classList.remove("hidden");
  buildExpCats();
  window.scrollTo({top:0,behavior:"smooth"});
}
function cancelExp() {
  expEditId=null;
  document.getElementById("exp-amount").value="";
  document.getElementById("exp-note").value="";
  document.getElementById("exp-date").value=today();
  document.getElementById("exp-form-title").textContent="＋ Nuova spesa";
  document.getElementById("exp-form-title").style.color="#6366f1";
  document.getElementById("exp-submit-btn").textContent="Aggiungi spesa";
  document.getElementById("exp-submit-btn").style.background="#6366f1";
  document.getElementById("exp-cancel-btn").classList.add("hidden");
}
function deleteExp(id) {
  if(!confirm("Eliminare questa spesa?")) return;
  expenses=expenses.filter(e=>e.id!==id);
  save(); renderAll();
}

// ── INCOME HANDLERS ───────────────────────────────────────────────────────
function submitInc() {
  const amt = parseFloat(document.getElementById("inc-amount").value);
  const date = document.getElementById("inc-date").value;
  if(!amt||!date) return;
  const entry = {id:incEditId||Date.now(), date, amount:amt, category:incCatSel, note:document.getElementById("inc-note").value};
  if(incEditId) {
    incomes = incomes.map(i=>i.id===incEditId?entry:i);
    incEditId=null;
  } else {
    incomes.unshift(entry);
  }
  save();
  document.getElementById("inc-amount").value="";
  document.getElementById("inc-note").value="";
  document.getElementById("inc-date").value=today();
  document.getElementById("inc-form-title").textContent="＋ Nuova entrata";
  document.getElementById("inc-submit-btn").textContent="Aggiungi entrata";
  document.getElementById("inc-cancel-btn").classList.add("hidden");
  document.getElementById("fiscal-preview").classList.add("hidden");
  renderAll();
}
function editInc(id) {
  const i = incomes.find(x=>x.id===id); if(!i) return;
  incEditId=id; incCatSel=i.category;
  document.getElementById("inc-amount").value=i.amount;
  document.getElementById("inc-date").value=i.date;
  document.getElementById("inc-note").value=i.note||"";
  document.getElementById("inc-form-title").textContent="✏️ Modifica entrata";
  document.getElementById("inc-form-title").style.color="#f59e0b";
  document.getElementById("inc-submit-btn").textContent="Salva modifiche";
  document.getElementById("inc-submit-btn").style.background="#f59e0b";
  document.getElementById("inc-cancel-btn").classList.remove("hidden");
  buildIncCats(); updateFiscalPreview(); updateIncLabel();
  window.scrollTo({top:0,behavior:"smooth"});
}
function cancelInc() {
  incEditId=null;
  document.getElementById("inc-amount").value="";
  document.getElementById("inc-note").value="";
  document.getElementById("inc-date").value=today();
  document.getElementById("inc-form-title").textContent="＋ Nuova entrata";
  document.getElementById("inc-form-title").style.color="#10b981";
  document.getElementById("inc-submit-btn").textContent="Aggiungi entrata";
  document.getElementById("inc-submit-btn").style.background="#10b981";
  document.getElementById("inc-cancel-btn").classList.add("hidden");
  document.getElementById("fiscal-preview").classList.add("hidden");
}
function deleteInc(id) {
  if(!confirm("Eliminare questa entrata?")) return;
  incomes=incomes.filter(i=>i.id!==id);
  save(); renderAll();
}

// ── VIEWS ─────────────────────────────────────────────────────────────────
function setExpView(v) {
  expView=v;
  document.getElementById("exp-sub-lista").style.background = v==="lista"?"#6366f1":"transparent";
  document.getElementById("exp-sub-lista").style.color = v==="lista"?"#fff":"#64748b";
  document.getElementById("exp-sub-ric").style.background = v==="riepilogo"?"#6366f1":"transparent";
  document.getElementById("exp-sub-ric").style.color = v==="riepilogo"?"#fff":"#64748b";
  renderExpList();
}
function setIncView(v) {
  incView=v;
  document.getElementById("inc-sub-lista").style.background = v==="lista"?"#10b981":"transparent";
  document.getElementById("inc-sub-lista").style.color = v==="lista"?"#fff":"#64748b";
  document.getElementById("inc-sub-ric").style.background = v==="riepilogo"?"#10b981":"transparent";
  document.getElementById("inc-sub-ric").style.color = v==="riepilogo"?"#fff":"#64748b";
  renderIncList();
}

// ── RENDER ────────────────────────────────────────────────────────────────
function renderAll() {
  const inc=totalInc(), exp=totalExp(), saldo=inc-exp;
  document.getElementById("h-inc").textContent = fmtShort(inc);
  document.getElementById("h-exp").textContent = fmtShort(exp);
  document.getElementById("h-saldo").textContent = fmtShort(saldo);
  const saldoCard = document.getElementById("h-saldo-card");
  const saldoVal = document.getElementById("h-saldo-val");
  saldoCard.style.border = `1px solid ${saldo>=0?"#06b6d422":"#f59e0b22"}`;
  saldoVal.style.color = saldo>=0?"#06b6d4":"#f59e0b";
  renderExpList();
  renderIncList();
  if(currentTab==="saldo") renderSaldo();
}

function renderExpList() {
  const chips = document.getElementById("exp-filter-chips");
  const list = document.getElementById("exp-list");
  if(expView==="lista") {
    chips.classList.remove("hidden");
    // build chips
    chips.innerHTML = `<button class="chip" style="background:${expFilter==="all"?"#6366f1":"#1e1e2e"};color:${expFilter==="all"?"#fff":"#64748b"}" onclick="setExpFilter('all')">Tutte</button>`
      + EXPENSE_CATS.map(c=>`<button class="chip" style="background:${expFilter===c.id?c.color:"#1e1e2e"};color:${expFilter===c.id?"#fff":"#64748b"}" onclick="setExpFilter('${c.id}')">${c.emoji}</button>`).join("");
    const items = expenses.filter(e=>(expFilter==="all"||e.category===expFilter)&&monthKey(e.date)===mk)
      .sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(!items.length) { list.innerHTML=emptyHTML("💸","Nessuna spesa questo mese"); return; }
    list.innerHTML = `<div class="entry-list">${items.map(e=>entryHTML(e,expCat(e.category),"exp")).join("")}</div>`;
  } else {
    chips.classList.add("hidden");
    const map={};
    expenses.filter(e=>monthKey(e.date)===mk).forEach(e=>{map[e.category]=(map[e.category]||0)+e.amount;});
    const items=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const total=totalExp();
    if(!items.length){list.innerHTML=emptyHTML("📊","Nessun dato per questo mese");return;}
    list.innerHTML=`<div class="breakdown-list">${items.map(([id,val])=>breakdownHTML(id,val,total,expCat(id))).join("")}</div>`;
  }
}

function setExpFilter(f) { expFilter=f; renderExpList(); }

function renderIncList() {
  const list = document.getElementById("inc-list");
  if(incView==="lista") {
    const items = incomes.filter(i=>monthKey(i.date)===mk).sort((a,b)=>new Date(b.date)-new Date(a.date));
    if(!items.length){list.innerHTML=emptyHTML("💵","Nessuna entrata questo mese");return;}
    list.innerHTML=`<div class="entry-list">${items.map(i=>incEntryHTML(i)).join("")}</div>`;
  } else {
    const map={};
    incomes.filter(i=>monthKey(i.date)===mk).forEach(i=>{map[i.category]=(map[i.category]||0)+incassatoNetto(i);});
    const items=Object.entries(map).sort((a,b)=>b[1]-a[1]);
    const total=totalInc();
    let html=`<div class="breakdown-list">${items.map(([id,val])=>breakdownHTML(id,val,total,incCat(id))).join("")}</div>`;
    // fiscal agg
    const fAdorea = calcFattura(incomes.filter(i=>monthKey(i.date)===mk&&["fisso_adorea","provvigioni"].includes(i.category)).reduce((s,i)=>s+i.amount,0));
    const f3T = calcFattura(incomes.filter(i=>monthKey(i.date)===mk&&i.category==="fatture_3t").reduce((s,i)=>s+i.amount,0));
    const totImp=totalImponibile();
    const totF=calcFattura(totImp);
    if(totImp>0){
      html+=`<div class="fiscal-agg"><p class="fiscal-agg-title">Riepilogo fiscale P.IVA</p>`;
      [[`Adorea (fisso + provv.)`,fAdorea,"#06b6d4"],[`3T`,f3T,"#f59e0b"]].filter(x=>x[1].imp>0).forEach(([lbl,d,col])=>{
        html+=`<div class="fiscal-block"><p class="fiscal-block-title" style="color:${col}">${lbl}</p>`;
        html+=fiscalRows(d);
        html+=`</div>`;
      });
      html+=`<div class="fiscal-total-box">
        <div style="display:flex;justify-content:space-between"><span style="font-size:12px;color:#94a3b8">Totale ritenute trattenute</span><span style="font-size:13px;font-weight:700;color:#ef4444">${fmt(totF.ritenuta)}</span></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px"><span style="font-size:12px;color:#94a3b8">Totale incassato netto</span><span style="font-size:13px;font-weight:700;color:#10b981">${fmt(totF.incassato)}</span></div>
      </div></div>`;
    }
    list.innerHTML=html;
  }
}

function fiscalRows(d) {
  return [
    {l:"Imponibile",        v:d.imp,           col:"#e2e8f0", bold:false},
    {l:"+ IVA 22%",         v:d.iva,           col:"#94a3b8", bold:false},
    {l:"= Totale fattura",  v:d.totaleFattura, col:"#f1f5f9", bold:true},
    {l:"− Ritenuta 20%",    v:d.ritenuta,      col:"#ef4444", bold:false},
    {l:"= Incassato netto", v:d.incassato,     col:"#10b981", bold:true},
  ].map(r=>`<div class="fiscal-row"><span class="fiscal-row-label">${r.l}</span><span class="fiscal-row-val" style="color:${r.col};font-weight:${r.bold?700:400}">${fmt(r.v)}</span></div>`).join("");
}

function renderSaldo() {
  const inc=totalInc(), exp=totalExp(), saldo=inc-exp;
  const totImp=totalImponibile(), totF=calcFattura(totImp);
  // hero
  const hero=document.getElementById("saldo-hero");
  hero.style.background = saldo>=0?"linear-gradient(135deg,#062018,#0f0f13)":"linear-gradient(135deg,#1f0808,#0f0f13)";
  hero.style.border = `1px solid ${saldo>=0?"#10b98144":"#ef444444"}`;
  document.getElementById("saldo-hero-label").textContent="Saldo "+monthLabel(today());
  document.getElementById("saldo-hero-val").textContent=(saldo>=0?"+":"−")+fmt(Math.abs(saldo));
  document.getElementById("saldo-hero-val").style.color=saldo>=0?"#10b981":"#ef4444";
  document.getElementById("saldo-hero-note").textContent=inc>0
    ? (saldo>=0?`Risparmio del ${Math.round(saldo/inc*100)}% sull'incassato netto`:"Spese superiori all'incassato netto")
    : "Nessuna entrata registrata";
  // bars
  const mx=Math.max(inc,exp,1);
  document.getElementById("saldo-bar-inc").style.width=`${inc/mx*100}%`;
  document.getElementById("saldo-bar-inc-val").textContent=fmt(inc);
  document.getElementById("saldo-bar-exp").style.width=`${exp/mx*100}%`;
  document.getElementById("saldo-bar-exp-val").textContent=fmt(exp);
  document.getElementById("saldo-imp-note").textContent=totImp>0?`Imponibile fatturato: ${fmt(totImp)} · IVA a credito: ${fmt(totF.iva)}`:"";
  // fonti
  document.getElementById("saldo-fonti").innerHTML=INCOME_CATS.map(c=>{
    const netto=incomes.filter(i=>monthKey(i.date)===mk&&i.category===c.id).reduce((s,i)=>s+incassatoNetto(i),0);
    if(!netto)return"";
    return`<div class="info-row">
      <span style="font-size:18px">${c.emoji}</span>
      <div style="flex:1"><p style="margin:0;font-size:13px;color:#e2e8f0;font-weight:500">${c.label}</p><p style="margin:0;font-size:10px;color:#475569">${c.tag}</p></div>
      <span style="font-size:14px;font-weight:700;color:${c.color}">${fmt(netto)}</span>
      <span style="font-size:11px;color:#475569;min-width:32px;text-align:right">${inc?Math.round(netto/inc*100):0}%</span>
    </div>`;
  }).join("");
  // spese
  const mapE={};
  expenses.filter(e=>monthKey(e.date)===mk).forEach(e=>{mapE[e.category]=(mapE[e.category]||0)+e.amount;});
  const catE=Object.entries(mapE).sort((a,b)=>b[1]-a[1]);
  document.getElementById("saldo-spese").innerHTML=!catE.length?`<p style="margin:0;font-size:13px;color:#475569">Nessuna spesa registrata</p>`
    :catE.map(([id,val])=>{const c=expCat(id);return`<div class="info-row">
      <span style="font-size:18px">${c.emoji}</span>
      <span style="flex:1;font-size:13px;color:#e2e8f0">${c.label}</span>
      <span style="font-size:14px;font-weight:700;color:#ef4444">${fmt(val)}</span>
      <span style="font-size:11px;color:#475569;min-width:32px;text-align:right">${exp?Math.round(val/exp*100):0}%</span>
    </div>`;}).join("");
}

// ── ENTRY HTML ────────────────────────────────────────────────────────────
function entryHTML(e, c, type) {
  return `<div class="entry">
    <div class="entry-icon" style="background:${c.color}22">${c.emoji}</div>
    <div class="entry-info">
      <p class="entry-name">${esc(e.note||c.label)}</p>
      <p class="entry-sub">${c.label} · ${new Date(e.date).toLocaleDateString("it-IT")}</p>
    </div>
    <div class="entry-amount"><span style="font-size:15px;font-weight:700;color:#ef4444">−${fmt(e.amount)}</span></div>
    <div class="entry-btns">
      <button class="icon-btn" style="background:#334155" onclick="editExp(${e.id})">✏️</button>
      <button class="icon-btn" style="background:#3f1e1e" onclick="deleteExp(${e.id})">🗑️</button>
    </div>
  </div>`;
}
function incEntryHTML(i) {
  const c=incCat(i.category), netto=incassatoNetto(i);
  return `<div class="entry">
    <div class="entry-icon" style="background:${c.color}22">${c.emoji}</div>
    <div class="entry-info">
      <p class="entry-name">${esc(i.note||c.label)}</p>
      <p class="entry-sub">${c.label} · ${new Date(i.date).toLocaleDateString("it-IT")}</p>
    </div>
    <div class="entry-amount">
      <p style="margin:0;font-size:15px;font-weight:700;color:#10b981">+${fmt(netto)}</p>
      ${c.isPiva?`<p style="margin:0;font-size:10px;color:#475569">imp. ${fmt(i.amount)}</p>`:""}
    </div>
    <div class="entry-btns">
      <button class="icon-btn" style="background:#334155" onclick="editInc(${i.id})">✏️</button>
      <button class="icon-btn" style="background:#3f1e1e" onclick="deleteInc(${i.id})">🗑️</button>
    </div>
  </div>`;
}
function breakdownHTML(id,val,total,c) {
  const pct=total?Math.round(val/total*100):0;
  return `<div class="breakdown-item">
    <div class="breakdown-header">
      <span style="font-size:20px">${c.emoji}</span>
      <span style="flex:1;font-size:13px;font-weight:600;color:#e2e8f0">${c.label}</span>
      <span style="font-size:15px;font-weight:700;color:#f1f5f9">${fmt(val)}</span>
      <span style="font-size:12px;color:#64748b;min-width:36px;text-align:right">${pct}%</span>
    </div>
    <div class="breakdown-bar-bg"><div class="breakdown-bar" style="width:${pct}%;background:${c.color}"></div></div>
  </div>`;
}
function emptyHTML(emoji,text) {
  return `<div class="empty"><p class="empty-emoji">${emoji}</p><p class="empty-text">${text}</p></div>`;
}
function esc(s) { return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
</script>
